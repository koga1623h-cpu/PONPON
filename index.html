<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBFBF9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MAKKURO">
<title>MAKKURO — 毎日トレーニング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFBF9; --card:#FFFFFF; --ink:#161616; --mute:#73736C;
    --line:#E4E3DD; --line2:#D6D5CE; --accent:#D8371A;
    --lv1:#DAD9D3; --lv2:#8C8B85; --lv3:#161616;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#E9E9E4}
  body{
    font-family:"DM Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;
  }
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);
    border-left:1px solid var(--ink);border-right:1px solid var(--ink);
    padding:0 0 calc(28px + env(safe-area-inset-bottom));}
  .mono,.num,.cnt,.ev,.ym{font-family:"DM Mono",ui-monospace,monospace}
  button{font-family:inherit;cursor:pointer;color:inherit}
  ::selection{background:#FBE3DC}

  /* header */
  .hd{display:flex;justify-content:space-between;align-items:center;
    padding:18px 18px 14px;border-bottom:1px solid var(--ink)}
  .logo{font-family:"Bebas Neue",sans-serif;font-size:30px;letter-spacing:.06em;line-height:.9}
  .tag{font-size:11px;color:var(--mute);letter-spacing:.04em;margin-top:2px}
  .iconbtn{width:38px;height:38px;border:1px solid var(--ink);background:var(--card);
    display:flex;align-items:center;justify-content:center}
  .iconbtn svg{width:20px;height:20px}

  /* segmented */
  .seg{display:flex;border-bottom:1px solid var(--ink)}
  .segbtn{flex:1;background:var(--paper);border:none;border-right:1px solid var(--line);
    padding:11px 6px;font-size:12.5px;font-weight:600;letter-spacing:.06em;color:var(--mute);
    text-transform:uppercase}
  .segbtn:last-child{border-right:none}
  .segbtn.on{background:var(--ink);color:#fff}

  .view{padding:16px 16px 4px}
  .card{background:var(--card);border:1px solid var(--ink);padding:16px 16px 18px;margin-bottom:14px}

  /* today */
  .cardtop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:13px}
  .date{font-size:16px;font-weight:700}
  .streak{font-size:12px;color:var(--mute)}
  .streak b{font-family:"Bebas Neue",sans-serif;font-size:21px;color:var(--accent);letter-spacing:.02em;margin-right:1px}
  .meter{display:flex;gap:4px;height:16px;border:1px solid var(--ink);padding:2px;background:var(--paper)}
  .meter i{flex:1;background:#fff;border:1px solid var(--line2);transition:background .25s,border-color .25s}
  .meter i.on{background:var(--ink);border-color:var(--ink)}
  .mlabel{font-size:12.5px;color:var(--mute);margin:7px 0 4px;letter-spacing:.02em}
  .kuro{color:var(--ink);font-weight:700}
  .kuro::before{content:"";display:inline-block;width:9px;height:9px;background:var(--ink);margin-right:6px;vertical-align:baseline}

  .rows{margin-top:12px}
  .trow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);padding:13px 12px;margin-bottom:8px;min-height:60px}
  .trow:last-child{margin-bottom:0}
  .trow.on{border-color:var(--ink)}
  .box{width:30px;height:30px;border:1.5px solid var(--ink);flex:none;background:#fff;
    display:flex;align-items:center;justify-content:center;transition:background .18s}
  .box svg{width:20px;height:20px;color:#fff}
  .trow.on .box{background:var(--ink)}
  .box.sm{width:24px;height:24px}.box.sm svg{width:16px;height:16px}
  .trow .ico{width:24px;height:24px;color:var(--ink);flex:none}
  .trow .ico svg{width:100%;height:100%}
  .tt{display:flex;flex-direction:column;min-width:0}
  .t1{font-size:15.5px;font-weight:700}
  .t2{font-size:11.5px;color:var(--mute);margin-top:1px}

  /* weekly */
  .ch{font-size:14px;font-weight:700;margin-bottom:13px;display:flex;align-items:baseline;justify-content:space-between}
  .ch .sub{font-size:11px;color:var(--mute);font-weight:400;letter-spacing:.02em}
  .wrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .wrow:first-child{border-top:none}
  .ico.sm{width:20px;height:20px;color:var(--ink);flex:none}
  .ico.sm svg{width:100%;height:100%}
  .wn{flex:1;font-size:13.5px;font-weight:600;min-width:0}
  .wt{font-size:10.5px;color:var(--mute);font-weight:400;margin-left:6px}
  .dots{display:flex;gap:3px}
  .dot{width:9px;height:9px;border:1px solid var(--line2)}
  .dot.f{background:var(--ink);border-color:var(--ink)}
  .dot.x{border-color:var(--accent)}
  .dot.x.f{background:var(--accent)}
  .cnt{font-size:14px;font-weight:600;width:18px;text-align:center}
  .pm{display:flex;gap:5px}
  .stp{width:30px;height:30px;border:1px solid var(--ink);background:var(--card);font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center}
  .stp:active{background:var(--ink);color:#fff}

  /* calendar */
  .calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .nav{width:34px;height:34px;border:1px solid var(--ink);background:var(--card);font-size:18px;line-height:1}
  .ym{font-size:17px;letter-spacing:.06em;font-weight:500}
  .calhead{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
  .wdh{text-align:center;font-size:10.5px;color:var(--mute);font-weight:600}
  .wdh.sun{color:var(--accent)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cell{aspect-ratio:1;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;
    position:relative;background:#fff}
  .cell.pad{border:none;background:transparent}
  .cell span{font-size:12px;font-family:"DM Mono",monospace}
  .cell.lv0{background:#fff}
  .cell.lv1{background:var(--lv1)}
  .cell.lv2{background:var(--lv2);border-color:var(--lv2)}
  .cell.lv2 span{color:#fff}
  .cell.lv3{background:var(--lv3);border-color:var(--lv3)}
  .cell.lv3 span{color:#fff}
  .cell.today{box-shadow:inset 0 0 0 2px var(--accent)}
  .cell.sel{box-shadow:inset 0 0 0 2px var(--ink)}
  .cell.today.sel{box-shadow:inset 0 0 0 2px var(--accent),inset 0 0 0 4px #fff}
  .legend{display:flex;align-items:center;gap:5px;margin-top:12px;font-size:10.5px;color:var(--mute)}
  .legend i{width:14px;height:14px;border:1px solid var(--line2)}
  .legend i.lv0{background:#fff}.legend i.lv1{background:var(--lv1)}
  .legend i.lv2{background:var(--lv2)}.legend i.lv3{background:var(--lv3)}
  .erows{display:flex;flex-direction:column;gap:8px}
  .erow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--card);
    border:1px solid var(--line);padding:11px 12px;font-size:14px;font-weight:600}
  .erow.on{border-color:var(--ink)}
  .erow .box.sm{margin:0}

  /* trend */
  .mseg{display:flex;border:1px solid var(--ink);margin-bottom:14px}
  .msegb{flex:1;background:var(--paper);border:none;border-right:1px solid var(--line);padding:9px 4px;
    font-size:12px;font-weight:600;color:var(--mute)}
  .msegb:last-child{border-right:none}
  .msegb.on{background:var(--ink);color:#fff}
  .charttop{font-size:13.5px;font-weight:700;margin-bottom:10px}
  .charttop .u2{font-size:10.5px;color:var(--mute);font-weight:400;margin-left:4px}
  .chart{width:100%;height:auto;display:block}
  .chart .ln{fill:none;stroke:var(--accent);stroke-width:2}
  .chart circle{fill:var(--ink)}
  .chart .ax{stroke:var(--line2);stroke-width:1;stroke-dasharray:2 3}
  .chart .xl{fill:var(--mute);font-size:8px;text-anchor:middle;font-family:"DM Mono",monospace}
  .chart .yl{fill:var(--mute);font-size:8px;text-anchor:end;font-family:"DM Mono",monospace}
  .empty{font-size:13px;color:var(--mute);padding:20px 4px;text-align:center;border:1px dashed var(--line2)}
  .empty.sm{padding:12px 4px;font-size:12px}
  .addrow{display:flex;gap:8px;margin-bottom:14px}
  .inp{border:1px solid var(--ink);background:var(--card);padding:9px 10px;font-size:13px;font-family:inherit}
  .inp[type=date]{flex:1.4;min-width:0}
  .inp.num{flex:1;width:100%}
  .addbtn{border:1px solid var(--ink);background:var(--ink);color:#fff;padding:9px 16px;font-size:13px;font-weight:600}
  .elist{display:flex;flex-direction:column}
  .erow2{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .erow2:first-child{border-top:none}
  .ed{font-size:12.5px;color:var(--mute);width:54px}
  .ev{flex:1;font-size:16px;font-weight:600}
  .ev .u{font-size:11px;color:var(--mute);font-weight:400;margin-left:3px}
  .del{border:none;background:none;color:var(--mute);font-size:11.5px;text-decoration:underline}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,20,20,.42);display:flex;align-items:flex-end;
    justify-content:center;z-index:50}
  .modal{background:var(--card);border:1px solid var(--ink);width:100%;max-width:480px;
    padding:18px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto}
  .mh{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:700;margin-bottom:12px}
  .x{border:none;background:none;font-size:24px;line-height:1;color:var(--mute)}
  .warn{font-size:11.5px;color:var(--accent);border:1px solid var(--accent);padding:8px 10px;margin-bottom:12px;line-height:1.45}
  .ml{font-size:11px;color:var(--mute);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin:10px 0 6px}
  .ta{width:100%;height:64px;border:1px solid var(--line2);padding:9px;font-family:"DM Mono",monospace;
    font-size:11px;resize:vertical;background:var(--paper)}
  .wbtn{display:block;width:100%;border:1px solid var(--ink);background:var(--card);padding:11px;
    font-size:13px;font-weight:600;margin-top:8px}
  .wbtn.danger{border-color:var(--accent);color:var(--accent);margin-top:18px}

  /* both-kids today */
  .ch2{font-size:13px;color:var(--mute);font-weight:600;letter-spacing:.02em;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
  .kidsel{display:flex;border:1px solid var(--ink);margin-bottom:14px}
  .kidpill{flex:1;background:var(--paper);border:none;border-right:1px solid var(--line);padding:10px;font-size:13.5px;font-weight:600;color:var(--mute)}
  .kidpill:last-child{border-right:none}
  .kidpill.on{background:var(--ink);color:#fff}
  .kidpanel + .kidpanel{margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
  .kp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .kp-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
  .kp-name .bk{width:11px;height:11px;background:var(--ink);display:inline-block}
  .kuro2{font-size:10.5px;font-weight:700;color:#fff;background:var(--ink);padding:2px 7px;letter-spacing:.04em}
  .kp-streak{font-size:11.5px;color:var(--mute)}
  .kp-streak b{font-family:"Bebas Neue",sans-serif;font-size:19px;color:var(--accent);margin-right:1px;letter-spacing:.02em}
  .tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .tile{background:var(--card);border:1px solid var(--line);padding:14px 4px 12px;display:flex;flex-direction:column;
    align-items:center;gap:7px;min-height:88px;position:relative}
  .tile .tico{width:27px;height:27px;color:var(--ink)}
  .tile .tico svg{width:100%;height:100%}
  .tile .tlab{font-size:11.5px;font-weight:600;color:var(--ink)}
  .tile.on{background:var(--ink);border-color:var(--ink)}
  .tile.on .tico{color:#fff}
  .tile.on .tlab{color:#fff}
  .tile .tck{position:absolute;top:5px;right:5px;width:16px;height:16px;color:#fff}
  .tile .tck svg{width:100%;height:100%}
  .wk2{padding:12px 0;border-top:1px solid var(--line)}
  .wk2:first-child{border-top:none;padding-top:0}
  .wk2-name{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;margin-bottom:9px}
  .wk2-name .wt{font-size:10.5px;color:var(--mute);font-weight:400;margin-left:auto}
  .wk2-kids{display:flex;gap:9px}
  .wk2-kid{flex:1;display:flex;align-items:center;gap:5px;border:1px solid var(--line);padding:6px 7px}
  .wk2-cn{font-size:11.5px;color:var(--mute);flex:1;min-width:0}
  .wk2-kid .stp{width:28px;height:28px}
  .wk2-kid .cnt{width:16px}

  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  *:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===== PONPON — daily training tracker ===== */
'use strict';

var KEY = 'ponpon_v1';
var CHILDREN = ['けいし', 'ゆうり'];
var DAILY = [
  { id: 'eyes', jp: '目のドリル', short: '目ドリル', sub: '寄り目↔遠く・上下左右・2本ペン' },
  { id: 'jump', jp: '連続ジャンプ', short: 'ジャンプ', sub: 'その場でポンポン跳ねる' },
  { id: 'step', jp: '速い足踏み', short: '足踏み', sub: 'ステッピング（足の回転）' }
];
var WEEKLY = [
  { id: 'ball', jp: '球技あそび', target: 2 },
  { id: 'broad', jp: '立ち幅跳び', target: 2 },
  { id: 'hill', jp: '坂・階段ダッシュ', target: 2 }
];
var METRICS = [
  { id: 'jumpreps', jp: '連続ジャンプ', unit: '回', lower: false },
  { id: 'broadjump', jp: '立ち幅跳び', unit: 'cm', lower: false },
  { id: 'run50', jp: '50m走', unit: '秒', lower: true }
];
var WD = ['日', '月', '火', '水', '木', '金', '土'];

/* ---- storage ---- */
var memOnly = false, state;
function blank() { return { daily: { 'けいし': {}, 'ゆうり': {} }, weekly: { 'けいし': {}, 'ゆうり': {} }, metrics: { 'けいし': [], 'ゆうり': [] } }; }
function load() {
  try { var raw = localStorage.getItem(KEY); state = raw ? JSON.parse(raw) : blank(); }
  catch (e) { memOnly = true; state = blank(); }
  CHILDREN.forEach(function (c) { state.daily[c] = state.daily[c] || {}; state.weekly[c] = state.weekly[c] || {}; state.metrics[c] = state.metrics[c] || []; });
}
function save() { if (memOnly) return; try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) { memOnly = true; } }

/* ---- dates ---- */
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function dkey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function parseKey(k) { var p = k.split('-'); return new Date(+p[0], +p[1] - 1, +p[2]); }
function today0() { var d = new Date(); d.setHours(0, 0, 0, 0); return d; }
function jpDate(d) { return (d.getMonth() + 1) + '月' + d.getDate() + '日(' + WD[d.getDay()] + ')'; }
function isoWeek(d) {
  var dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var day = dt.getUTCDay() || 7; dt.setUTCDate(dt.getUTCDate() + 4 - day);
  var ys = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  var wk = Math.ceil((((dt - ys) / 86400000) + 1) / 7);
  return dt.getUTCFullYear() + '-' + pad(wk);
}

/* ---- derived ---- */
function dayObj(child, key) { return state.daily[child][key] || {}; }
function dayCount(child, key) { var o = dayObj(child, key), n = 0; DAILY.forEach(function (it) { if (o[it.id]) n++; }); return n; }
function dayDone(child, key) { return dayCount(child, key) === DAILY.length; }
function streak(child) {
  var d = today0(); if (!dayDone(child, dkey(d))) d.setDate(d.getDate() - 1);
  var s = 0; while (dayDone(child, dkey(d))) { s++; d.setDate(d.getDate() - 1); } return s;
}

/* ---- ui ---- */
var ui = { view: 'today', child: 'けいし', cal: (function () { var d = today0(); d.setDate(1); return d; })(), sel: dkey(today0()), metric: 'jumpreps', sheet: false };

var IC = {
  eyes: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12c4-6 16-6 20 0-4 6-16 6-20 0Z"/><circle cx="12" cy="12" r="2.8"/></svg>',
  jump: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20V6"/><path d="M7 11l5-6 5 6"/><path d="M6 20h12"/></svg>',
  step: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 4v9M7 13a3 3 0 0 0 3 3M17 6v9M17 15a3 3 0 0 1-3 3"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M5 12.5l4.5 4.5L19 7"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/></svg>',
  ball: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="8.5"/><path d="M12 3.5v17M3.5 12h17"/></svg>',
  broad: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 18h7l5-5"/><path d="M12 13l4-1 1-4"/><circle cx="18" cy="6" r="1.6"/></svg>',
  hill: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 20L20 4"/><path d="M20 4v16H3"/></svg>'
};
function icon(id) { return IC[id] || ''; }

var app;
function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }

function seg(items, active, act) {
  return '<div class="seg" role="tablist">' + items.map(function (it) {
    return '<button class="segbtn' + (it.v === active ? ' on' : '') + '" data-act="' + act + '" data-v="' + it.v + '">' + esc(it.label) + '</button>';
  }).join('') + '</div>';
}
function kidsel() {
  return '<div class="kidsel">' + CHILDREN.map(function (c) {
    return '<button class="kidpill' + (c === ui.child ? ' on' : '') + '" data-act="child" data-v="' + c + '">' + esc(c) + '</button>';
  }).join('') + '</div>';
}
function h_header() {
  return '<header class="hd">' +
    '<div class="brand"><div class="logo">PONPON</div><div class="tag">毎日トレーニング記録</div></div>' +
    '<button class="iconbtn" data-act="sheet" aria-label="データ設定">' + icon('gear') + '</button>' +
    '</header>' +
    seg([{ v: 'today', label: 'TODAY' }, { v: 'cal', label: 'カレンダー' }, { v: 'trend', label: 'グラフ' }], ui.view, 'view');
}

function h_today() {
  var key = dkey(today0());
  var panels = CHILDREN.map(function (c) {
    var n = dayCount(c, key), done = n === DAILY.length, st = streak(c);
    var tiles = DAILY.map(function (it) {
      var on = !!dayObj(c, key)[it.id];
      return '<button class="tile' + (on ? ' on' : '') + '" data-act="daily" data-child="' + c + '" data-id="' + it.id + '">' +
        '<span class="tico">' + icon(it.id) + '</span>' +
        '<span class="tlab">' + esc(it.short) + '</span>' +
        '<span class="tck">' + (on ? icon('check') : '') + '</span></button>';
    }).join('');
    return '<div class="kidpanel">' +
      '<div class="kp-head"><span class="kp-name">' + (done ? '<i class="bk"></i>' : '') + esc(c) +
      (done ? '<span class="kuro2">真っ黒</span>' : '') + '</span>' +
      '<span class="kp-streak">' + (st > 0 ? '<b>' + st + '</b>日連続' : '今日から') + '</span></div>' +
      '<div class="tiles">' + tiles + '</div></div>';
  }).join('');

  var wk = isoWeek(today0());
  var weekly = '<div class="ch">今週の課題<span class="sub">遊びながら週2〜3回</span></div>' +
    WEEKLY.map(function (it) {
      var kids = CHILDREN.map(function (c) {
        var v = (state.weekly[c][wk] || {})[it.id] || 0;
        return '<div class="wk2-kid"><span class="wk2-cn">' + esc(c) + '</span>' +
          '<button class="stp" data-act="wk" data-child="' + c + '" data-id="' + it.id + '" data-d="-1">−</button>' +
          '<span class="cnt">' + v + '</span>' +
          '<button class="stp" data-act="wk" data-child="' + c + '" data-id="' + it.id + '" data-d="1">＋</button></div>';
      }).join('');
      return '<div class="wk2"><div class="wk2-name"><span class="ico sm">' + icon(it.id) + '</span>' + esc(it.jp) +
        '<span class="wt">週' + it.target + '回</span></div><div class="wk2-kids">' + kids + '</div></div>';
    }).join('');

  return '<div class="view">' +
    '<div class="card"><div class="ch2">' + jpDate(today0()) + '</div>' + panels + '</div>' +
    '<div class="card">' + weekly + '</div>' +
    '</div>';
}

function h_cal() {
  var c = ui.child, m = ui.cal, y = m.getFullYear(), mo = m.getMonth();
  var startWd = new Date(y, mo, 1).getDay(), days = new Date(y, mo + 1, 0).getDate();
  var tkey = dkey(today0()), cells = '';
  for (var i = 0; i < startWd; i++) cells += '<div class="cell pad"></div>';
  for (var d = 1; d <= days; d++) {
    var k = dkey(new Date(y, mo, d)), n = dayCount(c, k), cls = 'cell lv' + n;
    if (k === tkey) cls += ' today';
    if (k === ui.sel) cls += ' sel';
    cells += '<div class="' + cls + '" data-act="day" data-k="' + k + '"><span>' + d + '</span></div>';
  }
  var head = WD.map(function (w, i) { return '<div class="wdh' + (i === 0 ? ' sun' : '') + '">' + w + '</div>'; }).join('');
  var sk = ui.sel, sd = parseKey(sk);
  var ed = DAILY.map(function (it) {
    var on = !!dayObj(c, sk)[it.id];
    return '<button class="erow' + (on ? ' on' : '') + '" data-act="edit" data-id="' + it.id + '">' +
      '<span class="box sm">' + (on ? icon('check') : '') + '</span>' + esc(it.jp) + '</button>';
  }).join('');
  return '<div class="view">' + kidsel() +
    '<div class="card">' +
      '<div class="calnav"><button class="nav" data-act="mon" data-d="-1">‹</button>' +
      '<span class="ym">' + y + '. ' + pad(mo + 1) + '</span>' +
      '<button class="nav" data-act="mon" data-d="1">›</button></div>' +
      '<div class="cal"><div class="calhead">' + head + '</div><div class="calgrid">' + cells + '</div></div>' +
      '<div class="legend"><span>少</span><i class="lv0"></i><i class="lv1"></i><i class="lv2"></i><i class="lv3"></i><span>真っ黒</span></div>' +
    '</div>' +
    '<div class="card"><div class="ch">' + jpDate(sd) + ' を編集<span class="sub">押した分だけ反映</span></div>' +
      '<div class="erows">' + ed + '</div></div>' +
    '</div>';
}

function h_trend() {
  var c = ui.child, mid = ui.metric, met = METRICS.filter(function (x) { return x.id === mid; })[0];
  var data = state.metrics[c].filter(function (e) { return e.metric === mid; }).sort(function (a, b) { return a.date < b.date ? -1 : 1; });
  var chart = data.length >= 1 ? svgChart(data, met) : '<div class="empty">まだ記録がありません。下から最初の値を追加してください。</div>';
  var list = data.slice().reverse().map(function (e) {
    return '<div class="erow2"><span class="ed">' + esc(e.date.slice(5).replace('-', '/')) + '</span>' +
      '<span class="ev">' + e.v + '<span class="u">' + met.unit + '</span></span>' +
      '<button class="del" data-act="delm" data-date="' + e.date + '" data-metric="' + e.metric + '" data-v="' + e.v + '">削除</button></div>';
  }).join('') || '<div class="empty sm">記録一覧はここに出ます</div>';
  var pick = '<div class="mseg">' + METRICS.map(function (x) {
    return '<button class="msegb' + (x.id === mid ? ' on' : '') + '" data-act="metric" data-v="' + x.id + '">' + esc(x.jp) + '</button>';
  }).join('') + '</div>';
  return '<div class="view">' + kidsel() +
    '<div class="card">' + pick +
      '<div class="charttop">' + esc(met.jp) + ' の推移<span class="u2">（' + met.unit + (met.lower ? '・小さいほど速い' : '・大きいほど良い') + '）</span></div>' + chart +
    '</div>' +
    '<div class="card"><div class="ch">記録を追加</div>' +
      '<div class="addrow">' +
        '<input class="inp" type="date" id="mdate" value="' + dkey(today0()) + '">' +
        '<input class="inp num" type="number" id="mval" inputmode="decimal" placeholder="' + met.unit + '">' +
        '<button class="addbtn" data-act="addm">追加</button></div>' +
      '<div class="elist">' + list + '</div></div>' +
    '</div>';
}

function svgChart(data, met) {
  var W = 320, H = 150, pl = 30, pr = 12, pt = 14, pb = 22;
  var vals = data.map(function (d) { return +d.v; });
  var mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals);
  if (mn === mx) { mn -= 1; mx += 1; }
  var n = data.length;
  function X(i) { return pl + (n === 1 ? (W - pl - pr) / 2 : i * (W - pl - pr) / (n - 1)); }
  function Y(v) { return pt + (mx - v) * (H - pt - pb) / (mx - mn); }
  var pts = data.map(function (d, i) { return X(i) + ',' + Y(+d.v); });
  var dots = data.map(function (d, i) { return '<circle cx="' + X(i) + '" cy="' + Y(+d.v) + '" r="3.2"/>'; }).join('');
  var line = n >= 2 ? '<polyline class="ln" points="' + pts.join(' ') + '"/>' : '';
  var gy0 = Y(mn), gy1 = Y(mx);
  var labels = data.map(function (d, i) { return '<text class="xl" x="' + X(i) + '" y="' + (H - 6) + '">' + esc(d.date.slice(5).replace('-', '/')) + '</text>'; }).join('');
  return '<svg class="chart" viewBox="0 0 ' + W + ' ' + H + '">' +
    '<line class="ax" x1="' + pl + '" y1="' + gy0 + '" x2="' + (W - pr) + '" y2="' + gy0 + '"/>' +
    '<line class="ax" x1="' + pl + '" y1="' + gy1 + '" x2="' + (W - pr) + '" y2="' + gy1 + '"/>' +
    '<text class="yl" x="' + (pl - 5) + '" y="' + (gy1 + 4) + '">' + mx + '</text>' +
    '<text class="yl" x="' + (pl - 5) + '" y="' + (gy0 + 4) + '">' + mn + '</text>' +
    line + dots + labels + '</svg>';
}

function h_sheet() {
  if (!ui.sheet) return '';
  var json = ''; try { json = JSON.stringify(state); } catch (e) {}
  return '<div class="overlay" data-act="closesheet"><div class="modal" data-stop="1">' +
    '<div class="mh">データ<button class="x" data-act="closesheet">×</button></div>' +
    (memOnly ? '<div class="warn">プレビューでは保存されません。端末のブラウザで開く／GitHub Pages に置くと保存されます。</div>' : '') +
    '<div class="ml">書き出し（コピーして保管）</div>' +
    '<textarea class="ta" id="expta" readonly>' + esc(json) + '</textarea>' +
    '<button class="wbtn" data-act="copy">コピー</button>' +
    '<div class="ml">読み込み（貼り付けて復元）</div>' +
    '<textarea class="ta" id="impta" placeholder="バックアップJSONを貼り付け"></textarea>' +
    '<button class="wbtn" data-act="import">読み込む</button>' +
    '<button class="wbtn danger" data-act="reset">すべてリセット</button>' +
    '</div></div>';
}

function render() {
  var body = ui.view === 'today' ? h_today() : ui.view === 'cal' ? h_cal() : h_trend();
  app.innerHTML = h_header() + body + h_sheet();
}

function handle(act, el) {
  var key = dkey(today0());
  if (act === 'view') { ui.view = el.getAttribute('data-v'); render(); }
  else if (act === 'child') { ui.child = el.getAttribute('data-v'); render(); }
  else if (act === 'daily') {
    var c = el.getAttribute('data-child') || ui.child, id = el.getAttribute('data-id');
    var o = state.daily[c][key] || (state.daily[c][key] = {}); o[id] = !o[id]; save(); render();
  }
  else if (act === 'wk') {
    var wc = el.getAttribute('data-child') || ui.child, wk = isoWeek(today0()), wid = el.getAttribute('data-id'), dd = +el.getAttribute('data-d');
    var w = state.weekly[wc][wk] || (state.weekly[wc][wk] = {}); w[wid] = Math.max(0, (w[wid] || 0) + dd); save(); render();
  }
  else if (act === 'mon') { ui.cal.setMonth(ui.cal.getMonth() + (+el.getAttribute('data-d'))); render(); }
  else if (act === 'day') { ui.sel = el.getAttribute('data-k'); render(); }
  else if (act === 'edit') {
    var eid = el.getAttribute('data-id'); var eo = state.daily[ui.child][ui.sel] || (state.daily[ui.child][ui.sel] = {}); eo[eid] = !eo[eid]; save(); render();
  }
  else if (act === 'metric') { ui.metric = el.getAttribute('data-v'); render(); }
  else if (act === 'addm') {
    var dEl = document.getElementById('mdate'), vEl = document.getElementById('mval'), v = parseFloat(vEl.value);
    if (!dEl.value || isNaN(v)) { vEl.focus(); return; }
    state.metrics[ui.child].push({ date: dEl.value, metric: ui.metric, v: v }); save(); render();
  }
  else if (act === 'delm') {
    var dt = el.getAttribute('data-date'), mt = el.getAttribute('data-metric'), vv = +el.getAttribute('data-v'), arr = state.metrics[ui.child];
    for (var i = 0; i < arr.length; i++) { if (arr[i].date === dt && arr[i].metric === mt && +arr[i].v === vv) { arr.splice(i, 1); break; } } save(); render();
  }
  else if (act === 'sheet') { ui.sheet = true; render(); }
  else if (act === 'closesheet') { ui.sheet = false; render(); }
  else if (act === 'copy') { var ta = document.getElementById('expta'); ta.select(); try { document.execCommand('copy'); } catch (e) {} el.textContent = 'コピーしました'; setTimeout(function () { el.textContent = 'コピー'; }, 1400); }
  else if (act === 'import') { var imp = document.getElementById('impta').value.trim(); if (!imp) return; try { state = JSON.parse(imp); load(); save(); ui.sheet = false; render(); } catch (e) { document.getElementById('impta').style.borderColor = '#D8371A'; } }
  else if (act === 'reset') { if (window.confirm('すべての記録を消します。よろしいですか？')) { state = blank(); save(); ui.sheet = false; render(); } }
}

function init() {
  app = document.getElementById('app'); load(); render();
  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-act]'); if (!el) return;
    if (el.getAttribute('data-act') === 'closesheet' && e.target.closest('[data-stop]') && !e.target.closest('.x')) return;
    handle(el.getAttribute('data-act'), el);
  });
}
document.addEventListener('DOMContentLoaded', init);

</script>
